permalink: /blog/
layout: none

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Akbar Karimi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fdfbf8;
      --ink:    #0a0807;
      --soft:   #3d3935;
      --rule:   #c8c4be;
      --accent: #a0522d;
      --link:   #1a6fd4;
      --w:      820px;
    }

    html { font-size: 20px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }

    nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: 48px;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(1.5rem, calc((100vw - var(--w)) / 2));
      z-index: 99;
    }

    .nav-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 1.75rem;
    }

    .nav-links a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }
    .nav-links a.active { color: var(--ink); font-weight: 500; }

    main {
      max-width: var(--w);
      margin: 0 auto;
      padding: 6rem 1.5rem 7rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.6rem;
      font-weight: 400;
      font-style: italic;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .page-rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 3rem;
    }

    .empty {
      font-size: 0.9rem;
      color: var(--soft);
      font-style: italic;
    }

    @media (max-width: 540px) {
      nav { padding: 0 1.25rem; }
      .nav-links { gap: 1.1rem; }
      main { padding: 5rem 1.25rem 5rem; }
      h1 { font-size: 2.1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-name" href="/">Akbar Karimi</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#news">News</a></li>
      <li><a href="/#publications">Publications</a></li>
      <li><a href="/#teaching">Teaching</a></li>
      <li><a href="/#cv">CV</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/blog/" class="active">Blog</a></li>
    </ul>
  </nav>

  <main>
    <h1>Blog</h1>
    <hr class="page-rule">
    <p class="empty">Coming soon.</p>
  </main>

</body>
</html>
